<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Manage Your Finances</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💰 Expense Tracker</h1>
            <p class="subtitle">Manage your income and expenses efficiently</p>
        </header>

        <!-- Balance Summary Section -->
        <section class="summary-section">
            <div class="summary-cards">
                <!-- Total Balance Card -->
                <div class="card balance-card">
                    <div class="card-header">
                        <h3>Total Balance</h3>
                        <span class="card-icon">💵</span>
                    </div>
                    <p class="card-amount" id="totalBalance">$0.00</p>
                </div>

                <!-- Total Income Card -->
                <div class="card income-card">
                    <div class="card-header">
                        <h3>Total Income</h3>
                        <span class="card-icon">📈</span>
                    </div>
                    <p class="card-amount income" id="totalIncome">$0.00</p>
                </div>

                <!-- Total Expenses Card -->
                <div class="card expense-card">
                    <div class="card-header">
                        <h3>Total Expenses</h3>
                        <span class="card-icon">📉</span>
                    </div>
                    <p class="card-amount expense" id="totalExpenses">$0.00</p>
                </div>
            </div>
        </section>

        <!-- Main Content Section -->
        <main class="main-content">
            <!-- Left Side: Add Transaction Form -->
            <section class="form-section">
                <h2>Add Transaction</h2>
                <form id="transactionForm" class="transaction-form">
                    <!-- Transaction Type -->
                    <div class="form-group">
                        <label for="type">Transaction Type</label>
                        <select id="type" required>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>

                    <!-- Title -->
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input 
                            type="text" 
                            id="title" 
                            placeholder="e.g., Salary, Groceries" 
                            required
                        >
                    </div>

                    <!-- Amount -->
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input 
                            type="number" 
                            id="amount" 
                            placeholder="0.00" 
                            step="0.01" 
                            min="0" 
                            required
                        >
                    </div>

                    <!-- Category -->
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <optgroup label="Income Categories">
                                <option value="salary">Salary</option>
                                <option value="freelance">Freelance</option>
                                <option value="investment">Investment</option>
                                <option value="gift">Gift</option>
                                <option value="other-income">Other Income</option>
                            </optgroup>
                            <optgroup label="Expense Categories">
                                <option value="food">Food & Dining</option>
                                <option value="transportation">Transportation</option>
                                <option value="utilities">Utilities</option>
                                <option value="entertainment">Entertainment</option>
                                <option value="shopping">Shopping</option>
                                <option value="healthcare">Healthcare</option>
                                <option value="education">Education</option>
                                <option value="other-expense">Other Expense</option>
                            </optgroup>
                        </select>
                    </div>

                    <!-- Date -->
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input 
                            type="date" 
                            id="date" 
                            required
                        >
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary">Add Transaction</button>
                </form>
            </section>

            <!-- Right Side: Transactions List -->
            <section class="transactions-section">
                <div class="transactions-header">
                    <h2>Transactions</h2>
                    <div class="filter-controls">
                        <select id="filterType" class="filter-select">
                            <option value="">All Transactions</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                        <button id="clearAllBtn" class="btn btn-danger btn-small">Clear All</button>
                    </div>
                </div>

                <!-- Transactions List -->
                <div id="transactionsList" class="transactions-list">
                    <p class="empty-message">No transactions yet. Add one to get started!</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
